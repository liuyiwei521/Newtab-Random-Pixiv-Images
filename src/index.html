<!DOCTYPE html>
<html>

<head>
  <title>New Tab</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="container" class="notReady">
    <div class="maskLayer"></div>
    <div id="wallpaper">
      <div id="backgroundImage" class="bgImage"></div>
      <div id="foregroundImage" class="fgImage"></div>
    </div>
    <div id="pageControls">
      <label id="randomToggleControl" title="Start requesting random Pixiv images">
        <input type="checkbox" id="randomToggleInput" checked />
        <span class="random-toggle-slider" aria-hidden="true"></span>
        <span id="randomToggleText">Random</span>
      </label>
      <div id="pageActionButtons">
        <div id="refreshButton" title="Refresh image">
          <svg viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet" focusable="false" style="
                pointer-events: none;
                display: block;
                width: 100%;
                height: 100%;
                fill: #eeeeee;
              ">
            <g>
              <path
                d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z">
              </path>
            </g>
          </svg>
        </div>
        <div id="settingsButton" title="Tag Manager">
          <svg viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet" focusable="false" style="
                  pointer-events: none;
                  display: block;
                  width: 100%;
                  height: 100%;
                  fill: #eeeeee;
                ">
            <g>
              <path
                d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z">
              </path>
            </g>
          </svg>
        </div>
      </div>
    </div>
    <div id="illustInfo">
      <div id="likeButton" title="Add to random tag pool">
        <svg viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet" focusable="false"
          style="pointer-events:none;display:block;width:100%;height:100%;fill:#eeeeee;">
          <path d="M12 5c-5 0-9 4.5-10 7 1 2.5 5 7 10 7s9-4.5 10-7c-1-2.5-5-7-10-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z" />
        </svg>
      </div>
      <div id="bookmarkButton" title="Bookmark artwork">
        <svg viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet" focusable="false"
          style="pointer-events:none;display:block;width:100%;height:100%;fill:#eeeeee;">
          <path
            d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2zm0 14.97-5-2.14-5 2.14V5h10v12.97z" />
        </svg>
      </div>
      <div id="dislikeButton" title="Dislike — exclude a tag">
        <svg viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet" focusable="false"
          style="pointer-events:none;display:block;width:100%;height:100%;fill:#eeeeee;">
          <path
            d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z" />
        </svg>
      </div>
      <a id="avatar" href="">
        <div id="avatarImage"></div>
      </a>
      <div id="description">
        <div id="illustTitle"><a href="">Untitled</a></div>
        <div id="illustName"><a href=""></a></div>
        <div id="creatorActions">
          <div id="creatorLikeButton" title="Like creator">
            <svg viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet" focusable="false"
              style="pointer-events:none;display:block;width:100%;height:100%;fill:#eeeeee;">
              <path
                d="M15 11V5c0-1.1-.9-2-2-2l-1 1-4.59 4.59C7.15 8.85 7 9.19 7 9.56V19c0 1.1.9 2 2 2h7c.82 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1c0-1.1-.9-2-2-2h-4zm-6 10H5c-1.1 0-2-.9-2-2v-8c0-1.1.9-2 2-2h4v12z" />
            </svg>
          </div>
          <div id="creatorDislikeButton" title="Dislike creator">
            <svg viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet" focusable="false"
              style="pointer-events:none;display:block;width:100%;height:100%;fill:#eeeeee;">
              <path
                d="M15 3H8c-.82 0-1.54.5-1.84 1.22L3.14 11.27c-.09.23-.14.47-.14.73v1c0 1.1.9 2 2 2h4v6c0 1.1.9 2 2 2l1-1 4.59-4.59c.26-.26.41-.61.41-.97V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z" />
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Tag Popup for dislike -->
    <div id="tagPopup" class="tag-popup hidden">
      <div class="tag-popup-header">Select a tag to exclude:</div>
      <div id="tagList" class="tag-list"></div>
    </div>

    <div id="requestTagPopup" class="request-tag-popup hidden">
      <div id="requestTagPopupTitle" class="request-tag-popup-title">This request random tags</div>
      <div id="requestTagPopupList" class="request-tag-popup-list"></div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>
  </div>
  <script type="module" src="index.js"></script>
</body>

</html>
